


<!doctype html>
<html>
<body>
  <button id="login">Login with GitHub</button>

  <h3>Firebase ID Token (JWT)</h3>
  <textarea id="idToken" style="width:100%;height:160px;"></textarea>

  <h3>GitHub Access Token</h3>
  <textarea id="ghToken" style="width:100%;height:100px;"></textarea>

  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-app.js";
    import { getAuth, GithubAuthProvider, signInWithPopup } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-auth.js";

    // 🔴 ضعي config حق Firebase Web App
    const firebaseConfig = {
         apiKey: "AIzaSyBHCMa1KjYE_eV1qk3mH4U-6x_lNGaQjS0",
        authDomain:  "gitsavvy.firebaseapp.com",
        projectId: "gitsavvy",
        appId:  "1:144757355132:web:475d364024cae21712cff9"
    };

    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);

    document.getElementById("login").onclick = async () => {
      try {
        const provider = new GithubAuthProvider();
        provider.addScope("read:user"); // يكفي لجلب /user

        const result = await signInWithPopup(auth, provider);

        // ✅ Firebase ID Token
        const idToken = await result.user.getIdToken();
        document.getElementById("idToken").value = idToken;

        // ✅ GitHub Access Token (مهم!)
        const credential = GithubAuthProvider.credentialFromResult(result);
        const githubAccessToken = credential?.accessToken || "";
        document.getElementById("ghToken").value = githubAccessToken;

        console.log("Firebase ID Token:", idToken);
        console.log("GitHub Access Token:", githubAccessToken);

        if (!githubAccessToken) {
          alert("ما طلع GitHub access token. راجعي الملاحظة تحت.");
        }
      } catch (e) {
        console.error(e);
        alert(e.code + "\\n" + e.message);
      }
    };
  </script>
</body>
</html>
