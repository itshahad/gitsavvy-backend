version: "3.8"

services:
  db:
    image: postgres:15-alpine
    container_name: gitsavvy_postgres
    environment:
      POSTGRES_USER: ${DB_USERNAME}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB: ${DB_NAME}
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

  api:
    build:
      context: ./src
    container_name: gitsavvy_fastapi
    volumes:
      - ./src:/usr/src/app
    environment:
      DB_USERNAME: ${DB_USERNAME}
      DB_PASSWORD: ${DB_PASSWORD}
      DB_HOST: db
      DB_PORT: 5432
      DB_NAME: ${DB_NAME}
    ports:
      - "8000:8000"
    env_file:
      - .env
    depends_on:
      - db

  redis:
      image: redis:7-alpine
      ports:
        - "6379:6379"

  gpu_worker:
    build:
      context: ./src/indexer
      dockerfile: ./Dockerfile.gpu-worker
    environment:
      - CELERY_BROKER_URL=redis://redis:6379/0
      - CELERY_RESULT_BACKEND=redis://redis:6379/1
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]
    depends_on:
      - redis
volumes:
  pgdata:
