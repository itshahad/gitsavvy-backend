version: "3.8"

services:
  db:
    image: postgres:15-alpine
    container_name: gitsavvy_postgres
    environment:
      POSTGRES_USER: ${DB_USERNAME}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB: ${DB_NAME}
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

  api:
    build:
      context: .
      dockerfile: docker/api.Dockerfile
    container_name: gitsavvy_fastapi
    volumes:
      - ./src:/usr/src/app/src
    environment:
      PYTHONPATH: /usr/src/app
      DB_USERNAME: ${DB_USERNAME}
      DB_PASSWORD: ${DB_PASSWORD}
      DB_HOST: db
      DB_PORT: 5432
      DB_NAME: ${DB_NAME}
    working_dir: /usr/src/app
    ports:
      - "8000:8000"
    env_file:
      - .env
    depends_on:
      - db

  redis:
      image: redis:7-alpine
      ports:
        - "6379:6379"
  flower:
    build:
      context: .
      dockerfile: docker/flower.Dockerfile
    command: celery -A src.worker.worker flower --port=5555
    ports:
      - "5555:5555"
    environment:
      PYTHONPATH: /usr/src/app
      CELERY_INCLUDE_TASKS: "0"
      BROKER_URL: ${CELERY_BROKER_URL}
      RESULT_BACKEND: ${CELERY_RESULT_BACKEND}
    depends_on:
      - redis    

  gpu_worker:
    build:
      context: .
      dockerfile: docker/gpu-worker.Dockerfile
    container_name: gpu-worker
    volumes:
      - ./src:/usr/src/app/src
    working_dir: /usr/src/app
    environment:
      PYTHONPATH: /usr/src/app
    env_file:
      - .env
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]
    depends_on:
      - redis
volumes:
  pgdata:
