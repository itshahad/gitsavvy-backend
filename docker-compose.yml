version: "3.8"

services:
  redis:
    image: redis:7-alpine
    container_name: gitsavvy-redis

  db:
    image: postgres:15-alpine
    container_name: gitsavvy-postgres
    environment:
      POSTGRES_DB: ${DB_NAME}
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U gitsavvy -d gitsavvy"]
      interval: 5s
      timeout: 5s
      retries: 10

  server:
    container_name: gitsavvy-server
    build:
      context: ./gitsavvy_backend
    command: python manage.py runserver 0.0.0.0:8000
    volumes:
      - ./gitsavvy_backend:/usr/src/app
    ports:
      - "8001:8000"
    environment:
      DEBUG: ${DEBUG}
      SECRET_KEY: ${SECRET_KEY}
      ALLOWED_HOSTS: ${ALLOWED_HOSTS}
      DB_NAME: ${DB_NAME}
      DB_USER: ${DB_USER}
      DB_PASSWORD: ${DB_PASSWORD}
      DB_HOST: ${DB_HOST}
      DB_PORT: ${DB_PORT}
      CELERY_BROKER_URL: ${CELERY_BROKER_URL}
      GITHUB_API_URL: ${GITHUB_API_URL}
      GITHUB_API_TOKEN: ${GITHUB_API_TOKEN}
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_started

  celery:
    container_name: gitsavvy-celery
    build:
      context: ./gitsavvy_backend
    command: celery --app=gitsavvy_backend.celery:app worker -l INFO -Q queue1
    volumes:
      - ./gitsavvy_backend:/usr/src/app
    environment:
      DEBUG: ${DEBUG}
      SECRET_KEY: ${SECRET_KEY}
      ALLOWED_HOSTS: ${ALLOWED_HOSTS}
      DB_NAME: ${DB_NAME}
      DB_USER: ${DB_USER}
      DB_PASSWORD: ${DB_PASSWORD}
      DB_HOST: ${DB_HOST}
      DB_PORT: ${DB_PORT}
      CELERY_BROKER_URL: ${CELERY_BROKER_URL}
      GITHUB_API_URL: ${GITHUB_API_URL}
      GITHUB_API_TOKEN: ${GITHUB_API_TOKEN}
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_started

volumes:
  pgdata:
